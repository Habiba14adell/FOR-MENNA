<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#ddc5aa">
  <title>Groom - For the Bride</title>
  <link rel="stylesheet" href="sections.css">
  <style>
    .groom-page {
      width:min(1180px,100%);
      min-height:calc(100svh - clamp(20px,6vw,68px));
      margin:auto;
      overflow:hidden;
      background:linear-gradient(180deg,#fff9ed,#f7e5cf);
      box-shadow:0 12px 50px rgba(70,54,42,.1);
    }

    .groom-hero {
      min-height:calc(100svh - clamp(20px,6vw,68px));
      padding:clamp(28px,5vw,62px);
      display:flex;
      flex-direction:column;
      gap:clamp(26px,4vw,44px);
      background:
        radial-gradient(circle at 20% 12%,rgba(255,255,255,.76),transparent 28%),
        linear-gradient(135deg,#f2cf55,#f8e8bd 48%,#fff7e6);
    }

    .groom-heading {
      max-width:900px;
      margin:0 auto;
      text-align:center;
    }

    .groom-heading .section-kicker {
      margin-bottom:16px;
    }

    .groom-heading h1 {
      margin:0;
      font-family:"Italiana",serif;
      font-size:clamp(3.5rem,8vw,7rem);
      font-weight:400;
      line-height:.9;
    }

    .groom-heading p {
      max-width:620px;
      margin:20px auto 0;
      color:#705d4f;
      font-weight:300;
      line-height:1.8;
    }

    .groom-video-wrap {
      width:min(940px,100%);
      margin:0 auto;
      padding:clamp(10px,2vw,16px);
      border:1px solid rgba(73,55,43,.16);
      border-radius:10px;
      background:#fffaf2;
      box-shadow:0 28px 60px rgba(73,55,43,.16),8px 9px 0 rgba(242,207,85,.72);
    }

    .groom-video-wrap video {
      display:block;
      width:100%;
      max-height:68svh;
      border-radius:7px;
      background:#211a16;
      object-fit:contain;
    }

    .groom-signature {
      margin:18px 0 0;
      font-family:"Italiana",serif;
      font-size:1.45rem;
      text-align:center;
    }

    @media (max-width:760px) {
      body { padding:10px; }
      .groom-hero {
        min-height:calc(100svh - 20px);
        padding:28px 14px 44px;
      }

      .groom-video-wrap video {
        max-height:62svh;
      }
    }
  </style>
</head>
<body>
  <main class="groom-page">
    <section class="groom-hero">
      <a class="back" href="index.html#open-gifts">← Back to the gifts</a>
      <header class="groom-heading">
        <p class="section-kicker">A gift from the groom</p>
        <h1>From Omar</h1>
        <p>A private video from the person waiting for this forever with you.</p>
      </header>

      <div class="groom-video-wrap">
        <video controls playsinline preload="metadata">
          <source src="family/omar.mp4" type="video/mp4">
        </video>
        <p class="groom-signature">With all my love, Omar</p>
      </div>
    </section>
  </main>
</body>
</html>
